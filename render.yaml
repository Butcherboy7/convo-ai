services:
  # 1. The Token Server (Web Service)
  - type: web
    name: tutor-api
    env: docker
    dockerContext: agent
    dockerfilePath: Dockerfile
    plan: free # Can be changed to 'starter' for better performance
    envVars:
      - key: PORT
        value: 8000
      - fromGroup: tutor-secrets

  # 2. The AI Agent (Background Worker)
  - type: worker
    name: tutor-agent
    env: docker
    dockerContext: agent
    dockerfilePath: Dockerfile
    # Override command to run the agent instead of token server
    dockerCommand: python agent.py start
    plan: free # Note: Free workers may have limitations
    envVars:
      - fromGroup: tutor-secrets

  # 3. The Frontend (Static Site)
  - type: static
    name: tutor-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_TOKEN_SERVER_URL
        # This will be your API URL + /token
        # Render doesn't know the URL yet, so you'll update this once!
        value: https://tutor-api.onrender.com/token

envVarGroups:
  - name: tutor-secrets
    envVars:
      - key: LIVEKIT_URL
      - key: LIVEKIT_API_KEY
      - key: LIVEKIT_API_SECRET
      - key: GROQ_API_KEY
      - key: CARTESIA_API_KEY
