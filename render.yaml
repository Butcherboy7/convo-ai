services:
  # Combined Backend (Token Server + AI Agent)
  - type: web
    name: tutor-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - fromGroup: tutor-secrets

  # Frontend (Static Site)
  - type: web
    name: tutor-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_TOKEN_SERVER_URL
        value: https://tutor-backend.onrender.com/token

envVarGroups:
  - name: tutor-secrets
    envVars:
      - key: LIVEKIT_URL
        value: "REPLACE_ME"
      - key: LIVEKIT_API_KEY
        value: "REPLACE_ME"
      - key: LIVEKIT_API_SECRET
        value: "REPLACE_ME"
      - key: GROQ_API_KEY
        value: "REPLACE_ME"
      - key: CARTESIA_API_KEY
        value: "REPLACE_ME"
